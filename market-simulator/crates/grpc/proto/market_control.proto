syntax = "proto3";

package market_control;

// Service for controlling the market simulator.
service MarketControl {
    // Reset both the order book and the database tables.
    rpc ResetMarket (ResetRequest) returns (ResetResponse);
    // Retrieve all pending orders from the data book.
    rpc DumpOrderBook (DumpOrderBookRequest) returns (DumpOrderBookResponse);
    // Retrieve the last 10 trades from the database.
    rpc GetLastTrades (GetLastTradesRequest) returns (GetLastTradesResponse);
}

message ResetRequest {}

message ResetResponse {
    bool   success = 1;
    string message = 2;
}

message DumpOrderBookRequest {}

message PendingOrder {
    double price          = 1;
    double quantity       = 2;
    string side           = 3;
    string symbol         = 4;
    string order_type     = 5;
    string cl_ord_id      = 6;
    string orig_cl_ord_id = 7;
    string sender_id      = 8;
    string target_id      = 9;
    uint64 timestamp      = 10;
}

message DumpOrderBookResponse {
    bool   success = 1;
    string message = 2;
    repeated PendingOrder orders = 3;
}

message GetLastTradesRequest {}

message Trade {
    uint64 id        = 1;
    double price     = 2;
    double quantity  = 3;
    string cl_ord_id = 4;
}

message GetLastTradesResponse {
    bool   success = 1;
    string message = 2;
    repeated Trade trades = 3;
}
