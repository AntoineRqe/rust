<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FIX 4.2 Terminal</title>
<style>
  :root {
    --bg:#0d0f14; --panel:#13161e; --panel2:#0f111a; --border:#1e2330;
    --green:#00e676; --red:#ff3d57; --blue:#2979ff; --gold:#ffd740;
    --teal:#00bcd4; --text:#e8ecf4; --muted:#5a6070;
    --bid-bg:#0a1a10; --ask-bg:#1a0a0e; --bid-bar:#003a18; --ask-bar:#3a0a10;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;
       font-size:13px;display:flex;flex-direction:column}

  /* ── topbar ── */
  #topbar{background:var(--panel);height:42px;display:flex;align-items:center;
          padding:0 14px;justify-content:space-between;flex-shrink:0;
          border-bottom:1px solid var(--border);gap:8px}
  #topbar h1{color:var(--green);font-size:12px;letter-spacing:.04em;white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis}
  #status-dot{font-size:12px;color:var(--red);white-space:nowrap;flex-shrink:0}
  #status-dot.on{color:var(--green)}
  /* ws indicator separate from FIX connection */
  #ws-dot{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
  #ws-dot.on{color:var(--teal)}

  /* ── mobile tab bar ── */
  #tabbar{display:none;background:var(--panel);border-bottom:1px solid var(--border);
          flex-shrink:0}
  #tabbar button{flex:1;padding:10px 0;background:transparent;color:var(--muted);
                 border:none;border-bottom:2px solid transparent;cursor:pointer;
                 font-family:'Courier New',monospace;font-size:11px;font-weight:bold}
  #tabbar button.active{color:var(--green);border-bottom-color:var(--green)}

  /* ── main layout ── */
  #body{display:flex;flex:1;overflow:hidden;min-height:0}

  /* ── panels ── */
  .panel{display:flex;flex-direction:column;overflow:hidden;min-height:0}
  #col-left{width:290px;min-width:260px;background:var(--panel);
            border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto}
  #col-book{width:280px;min-width:240px;background:var(--panel2);
            border-right:1px solid var(--border);flex-shrink:0;
            display:flex;flex-direction:column;overflow:hidden}
  #col-log{flex:1;background:var(--bg);display:flex;flex-direction:column;min-width:0}
  #col-chart{width:260px;min-width:220px;background:var(--panel2);
             border-left:1px solid var(--border);flex-shrink:0;
             display:flex;flex-direction:column}

  /* ── form elements ── */
  .stitle{font-size:9px;letter-spacing:.12em;color:var(--muted);
          padding:12px 14px 4px;text-transform:uppercase}
  .ssep{height:1px;background:var(--border);margin:0 14px 6px}
  .frow{display:flex;align-items:center;padding:3px 14px}
  .frow label{color:var(--muted);width:100px;flex-shrink:0;font-size:11px}
  .frow input{background:#1a1e2a;border:1px solid var(--border);color:var(--text);
              font-family:'Courier New',monospace;font-size:11px;
              padding:5px 6px;flex:1;outline:none;min-width:0}
  .frow input:focus{border-color:var(--blue)}
  .frow input:disabled{opacity:.4;cursor:not-allowed}
  button{font-family:'Courier New',monospace;cursor:pointer;border:none;outline:none}
  button:disabled{opacity:.4;cursor:not-allowed}
  .btn{display:block;width:calc(100% - 28px);margin:4px 14px;
       padding:9px 0;font-size:12px;font-weight:bold;letter-spacing:.04em;text-align:center}
  .btn-connect{background:var(--blue);color:var(--text)}
  .btn-send{background:var(--green);color:#0d0f14;font-size:14px;padding:11px 0;margin-top:10px}
  .btn-send.sell{background:var(--red)}
  .side-row{display:flex;align-items:center;padding:6px 14px}
  .side-row label{color:var(--muted);width:100px;flex-shrink:0;font-size:11px}
  .sbtn{padding:6px 0;width:76px;font-size:11px;font-weight:bold}
  #btn-buy{background:var(--green);color:#0d0f14;margin-right:6px}
  #btn-sell{background:#1a1e2a;color:var(--muted)}
  .md-btn{display:block;width:calc(100% - 28px);margin:2px 14px;
          padding:6px 10px;text-align:left;background:#0e1520;
          color:var(--teal);font-size:11px;font-weight:bold}
  .footer-row{display:flex;justify-content:space-between;padding:8px 14px 10px}
  .ghost{background:transparent;color:var(--muted);font-size:10px;
         font-family:'Courier New',monospace;padding:3px 6px}
  .ghost:hover{color:var(--text)}

  /* ── open orders ── */
  .order-row{display:flex;align-items:center;justify-content:space-between;
             background:#1a1e2a;padding:6px 8px;margin:3px 0;border-radius:2px;
             font-size:10px;border-left:2px solid var(--blue)}
  .order-row.sell{border-left-color:var(--red)}
  .order-info{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .order-info .sym{color:var(--teal);font-weight:bold}
  .order-info .qty{color:var(--muted)}
  .order-info .px{color:var(--gold)}
  .order-cancel{background:transparent;color:var(--red);border:none;cursor:pointer;
                font-size:12px;font-weight:bold;padding:2px 6px;margin-left:4px;
                flex-shrink:0}
  .order-cancel:hover{color:#ff5577}

  /* ── order book ── */
  #book-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 10px 4px}
  #book-sym{color:var(--teal);font-size:11px;font-weight:bold}
  #book-last{color:var(--gold);font-size:10px}
  .bk-level{display:flex;align-items:center;height:22px;margin:1px 6px;
             position:relative;overflow:hidden}
  .bk-level .bar{position:absolute;top:0;bottom:0;left:0}
  .bid-lv{background:var(--bid-bg)}.bid-lv .bar{background:var(--bid-bar)}
  .ask-lv{background:var(--ask-bg)}.ask-lv .bar{background:var(--ask-bar)}
  .lv-qty{flex:1;text-align:right;font-size:11px;padding-right:6px;position:relative;z-index:1}
  .lv-px{width:86px;text-align:right;font-size:11px;font-weight:bold;
          padding-right:4px;position:relative;z-index:1}
  .bid-lv .lv-px,.bid-lv .lv-qty{color:var(--green)}
  .ask-lv .lv-px,.ask-lv .lv-qty{color:var(--red)}
  #spread-row{height:24px;display:flex;align-items:center;justify-content:center;
              font-size:10px;color:var(--muted);
              border-top:1px solid var(--border);border-bottom:1px solid var(--border);
              margin:2px 0;flex-shrink:0}
  #trades-hdr{font-size:9px;color:var(--muted);letter-spacing:.1em;
              padding:5px 10px 2px;flex-shrink:0}
  #trades-list{flex:1;overflow-y:auto;padding:0 6px 6px;min-height:0}
  .tr-row{display:flex;gap:6px;font-size:11px;line-height:1.8}
  .tr-row .td{width:14px;font-weight:bold}
  .tr-row .tp{width:86px;text-align:right;font-weight:bold}
  .tr-row .tq{width:66px;text-align:right;color:var(--muted)}
  .tr-row .tt{color:var(--muted);font-size:10px}
  .tr-buy .td,.tr-buy .tp{color:var(--green)}
  .tr-sell .td,.tr-sell .tp{color:var(--red)}

  /* ── log ── */
  #log-hdr{display:flex;justify-content:space-between;align-items:center;
           padding:8px 10px 4px;flex-shrink:0}
  #log-hdr span{font-size:9px;color:var(--muted);letter-spacing:.1em}
  #log-box{flex:1;overflow-y:auto;padding:0 8px 8px;font-size:10px;
           background:#0a0c10;min-height:0}
  .le{margin-bottom:10px}
  .lts{color:var(--muted)}
  .llbl{display:block;margin-bottom:2px}
  .lbody{color:#9e9e9e;word-break:break-all;line-height:1.5}
  .tsend{color:var(--green)}.tfeed{color:var(--gold)}.tmd{color:var(--teal)}
  .terr{color:var(--red)}.tinfo{color:var(--blue)}

  /* ── chart ── */
  #chart-hdr{display:flex;justify-content:space-between;align-items:center;
             padding:8px 10px 4px;flex-shrink:0}
  #chart-hdr span{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  #chart-wrap{flex:1;position:relative;overflow:hidden;padding:4px 6px 6px;min-height:0}
  #price-canvas{display:block;width:100%;height:100%}

  /* ── dialog ── */
  #dlg-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
           align-items:center;justify-content:center;z-index:200;padding:16px}
  #dlg-box{background:var(--panel);padding:20px 24px;width:100%;max-width:400px;
           border:1px solid var(--border)}
  #dlg-title{color:var(--teal);font-size:12px;font-weight:bold;
             margin-bottom:14px;letter-spacing:.05em}
  .dlg-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
  .dlg-row label{color:var(--muted);width:120px;flex-shrink:0;font-size:11px}
  .dlg-row input,.dlg-row select{
    background:#1a1e2a;border:1px solid var(--border);color:var(--text);
    font-family:'Courier New',monospace;font-size:11px;
    padding:5px 6px;flex:1;outline:none;min-width:0}
  .dlg-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .dlg-foot button{padding:7px 16px;font-family:'Courier New',monospace;
                   cursor:pointer;border:none;font-size:11px}

  /* ── scrollbars ── */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* ════════════════════════════════════
     TABLET  768–1199px  →  2×2 grid
  ════════════════════════════════════ */
  @media (max-width:1199px) {
    #body{flex-wrap:wrap}
    #col-left {width:50%;min-width:0;border-right:none;border-bottom:1px solid var(--border);
               max-height:55vh;overflow-y:auto;flex-shrink:0}
    #col-book {width:50%;min-width:0;border-right:none;border-left:1px solid var(--border);
               border-bottom:1px solid var(--border);max-height:55vh;flex-shrink:0}
    #col-log  {width:60%;min-width:0;flex:none;height:calc(45vh - 42px)}
    #col-chart{width:40%;min-width:0;border-left:1px solid var(--border);
               height:calc(45vh - 42px)}
  }

  /* ════════════════════════════════════
     MOBILE  <768px  →  tabs
  ════════════════════════════════════ */
  @media (max-width:767px) {
    #topbar h1{font-size:10px}
    #tabbar{display:flex}
    #body{flex-wrap:nowrap;flex-direction:column}
    #col-left,#col-book,#col-log,#col-chart{
      width:100%;min-width:0;height:100%;flex-shrink:0;
      border:none;max-height:none;display:none}
    #col-left.active,#col-book.active,#col-log.active,#col-chart.active{display:flex}
    .btn{padding:12px 0;font-size:13px}
    .btn-send{padding:14px 0;font-size:15px}
    .frow input{font-size:13px;padding:7px 6px}
    .md-btn{padding:10px 12px;font-size:12px}
    .sbtn{padding:9px 0;font-size:13px}
    .dlg-row{flex-direction:column;align-items:flex-start}
    .dlg-row label{width:auto;margin-bottom:3px}
    .dlg-row input,.dlg-row select{width:100%}
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>&#x2B21; FIX 4.2 &nbsp;ORDER &amp; MARKET DATA TERMINAL</h1>
  <span id="ws-dot">&#9679; WS</span>
  <span id="status-dot">&#9679; DISCONNECTED</span>
</div>

<div id="tabbar">
  <button onclick="showTab('col-left')"  id="tab-left"  class="active">ORDERS</button>
  <button onclick="showTab('col-book')"  id="tab-book">BOOK</button>
  <button onclick="showTab('col-log')"   id="tab-log">LOG</button>
  <button onclick="showTab('col-chart')" id="tab-chart">CHART</button>
</div>

<div id="body">

<!-- LEFT: order entry -->
<div id="col-left" class="panel active">
  <div class="stitle">ORDER ENTRY</div><div class="ssep"></div>
  <div class="frow"><label>Symbol</label>     <input id="o-sym"   value="AAPL"></div>
  <div class="frow"><label>Quantity</label>   <input id="o-qty"   value="100"></div>
  <div class="frow"><label>Limit Price</label><input id="o-price" value="150.00"></div>
  <div class="side-row">
    <label>Side</label>
    <button id="btn-buy"  class="sbtn" onclick="setSide('BUY')">BUY</button>
    <button id="btn-sell" class="sbtn" onclick="setSide('SELL')">SELL</button>
  </div>
  <button id="btn-send" class="btn btn-send" onclick="sendOrder()" disabled>
    &#9654; &nbsp;BUY ORDER
  </button>

  <div class="stitle" style="margin-top:8px">OPEN ORDERS</div><div class="ssep"></div>
  <div id="orders-list" style="flex:1;overflow-y:auto;padding:0 6px 6px;min-height:40px">
    <span style="color:var(--muted);font-size:10px">No open orders</span>
  </div>

  <div class="stitle" style="margin-top:8px">MARKET DATA</div><div class="ssep"></div>
  <button class="md-btn" id="md-V" onclick="openDlg('V')" disabled>V &nbsp; Market Data Request</button>
  <button class="md-btn" id="md-W" onclick="openDlg('W')" disabled>W &nbsp; MD Snapshot Full Refresh</button>
  <button class="md-btn" id="md-X" onclick="openDlg('X')" disabled>X &nbsp; MD Incremental Refresh</button>
  <button class="md-btn" id="md-Y" onclick="openDlg('Y')" disabled>Y &nbsp; MD Request Reject</button>

  <div class="footer-row">
    <button class="ghost" onclick="send({action:'clear_book'})">clear book</button>
    <button class="ghost" onclick="send({action:'reset_seq'})">reset seq</button>
  </div>
</div>

<!-- BOOK: order book + trades -->
<div id="col-book" class="panel">
  <div id="book-hdr">
    <span id="book-sym">ORDER BOOK &nbsp;&#8212;</span>
    <span id="book-last">last: &#8212;</span>
  </div>
  <div style="height:1px;background:var(--border);margin:0 6px 4px"></div>
  <div id="asks"></div>
  <div id="spread-row">spread: &#8212;</div>
  <div id="bids"></div>
  <div id="trades-hdr">LAST TRADES</div>
  <div id="trades-list"></div>
</div>

<!-- LOG: message log -->
<div id="col-log" class="panel">
  <div id="log-hdr">
    <span>MESSAGE LOG</span>
    <button class="ghost" onclick="ge('log-box').innerHTML=''">CLEAR</button>
  </div>
  <div id="log-box"></div>
</div>

<!-- CHART: price chart -->
<div id="col-chart" class="panel">
  <div id="chart-hdr">
    <span>PRICE CHART</span>
    <button class="ghost" onclick="clearChart()">CLEAR</button>
  </div>
  <div id="chart-wrap">
    <canvas id="price-canvas"></canvas>
  </div>
</div>

</div><!-- #body -->

<!-- DIALOG -->
<div id="dlg-ov">
  <div id="dlg-box">
    <div id="dlg-title"></div>
    <div id="dlg-fields"></div>
    <div class="dlg-foot">
      <button style="background:var(--border);color:var(--muted)" onclick="closeDlg()">CANCEL</button>
      <button style="background:var(--blue);color:var(--text);font-weight:bold" onclick="submitDlg()">SEND</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── state ─────────────────────────────────────────────────────────────────────
let side      = 'BUY';
let dlgType   = null;
let ws        = null;
const LEVELS  = 8;
let clordSeq  = 0;
const ORDER_PENDING_TIMEOUT_MS = 30000;

// client-side order book (updated from exec reports)
const book = {
  bids:    {},   // price → qty
  asks:    {},
  trades:  [],   // [{px,qty,side,ts}]
  last:    null,
  symbol:  '—',
  pending: {},   // clordId → {price, qty, side}
  orderState: {}, // clordId → {side, price, leaves}
};

// open orders (by clordId)
const openOrders = {}; // clordId → {symbol, qty, price, side}
const orderTimeouts = {}; // clordId → timeout handle

// chart history
let chartPts = [], lastTradeCount = 0;

// ── helpers ───────────────────────────────────────────────────────────────────
const ge  = id => document.getElementById(id);
const fmt = v  => parseFloat(v).toFixed(4);
const esc = s  => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    ge('ws-dot').textContent = '● WS';
    ge('ws-dot').className   = 'on';
    appendLog({ ts: now(), label: 'INFO', body: 'WebSocket connected', tag: 'info' });
    // enable send button only when FIX is also connected
    // (status event from server will enable it)
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    handleServerEvent(msg);
  };

  ws.onclose = () => {
    ge('ws-dot').textContent = '● WS';
    ge('ws-dot').className   = '';
    appendLog({ ts: now(), label: 'INFO', body: 'WebSocket disconnected — reconnecting…', tag: 'info' });
    handleStatus(false);
    // auto-reconnect after 2s
    setTimeout(connectWS, 2000);
  };

  ws.onerror = err => {
    console.error('WebSocket error', err);
  };
}

// ── route incoming server events ──────────────────────────────────────────────
function handleServerEvent(msg) {
  switch (msg.type) {
    case 'status':
      handleStatus(msg.connected);
      break;
    case 'fix_message':
      appendLog({ ts: now(), label: msg.label, body: msg.body, tag: msg.tag });
      // parse the FIX message to update order book
      updateBookFromFix(msg.body, msg.tag);
      break;
    default:
      console.warn('Unknown server event:', msg);
  }
}

// ── send to server ────────────────────────────────────────────────────────────
function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  } else {
    appendLog({ ts: now(), label: 'ERROR', body: 'WebSocket not connected', tag: 'err' });
  }
}

// ── FIX status ────────────────────────────────────────────────────────────────
function handleStatus(connected) {
  const dot = ge('status-dot');
  dot.textContent = connected ? '● CONNECTED' : '● DISCONNECTED';
  dot.className   = connected ? 'on' : '';
  ge('btn-send').disabled = !connected;
  document.querySelectorAll('.md-btn').forEach(b => b.disabled = !connected);
}

// ── side toggle ───────────────────────────────────────────────────────────────
function setSide(s) {
  side = s;
  if (s === 'BUY') {
    ge('btn-buy').style.cssText  = 'background:var(--green);color:#0d0f14';
    ge('btn-sell').style.cssText = 'background:#1a1e2a;color:var(--muted)';
    ge('btn-send').textContent   = '▶  BUY ORDER';
    ge('btn-send').className     = 'btn btn-send';
  } else {
    ge('btn-sell').style.cssText = 'background:var(--red);color:#0d0f14';
    ge('btn-buy').style.cssText  = 'background:#1a1e2a;color:var(--muted)';
    ge('btn-send').textContent   = '▶  SELL ORDER';
    ge('btn-send').className     = 'btn btn-send sell';
  }
}

// ── send order ────────────────────────────────────────────────────────────────
function sendOrder() {
  const symbol = ge('o-sym').value.trim().toUpperCase();
  const qty    = parseFloat(ge('o-qty').value);
  const price  = parseFloat(ge('o-price').value);
  const s      = side === 'BUY' ? '1' : '2';

  // FIX OrderId in this project is fixed-size (20 chars); keep ClOrdID <= 20.
  clordSeq = (clordSeq + 1) % 1000;
  const ts = Date.now().toString().slice(-9);
  const clordId = `ORD-WEB-${ts}${clordSeq.toString().padStart(3, '0')}`;
  book.pending[clordId] = { price, qty, side: s };
  openOrders[clordId] = { symbol, qty, price, side: s };
  schedulePendingTimeout(clordId);

  send({ action: 'order', clord_id: clordId, symbol, qty, price, side: s });
  renderOrders();
}

function clearPendingTimeout(clordId) {
  const t = orderTimeouts[clordId];
  if (t) {
    clearTimeout(t);
    delete orderTimeouts[clordId];
  }
}

function cleanupOrderState(clordId) {
  if (!clordId) return;
  clearPendingTimeout(clordId);
  delete book.pending[clordId];
  delete book.orderState[clordId];
  delete openOrders[clordId];
}

function schedulePendingTimeout(clordId) {
  clearPendingTimeout(clordId);
  orderTimeouts[clordId] = setTimeout(() => {
    if (!book.pending[clordId]) return;
    cleanupOrderState(clordId);
    renderOrders();
    appendLog({
      ts: now(),
      label: 'INFO',
      body: `Order timeout cleanup (${clordId})`,
      tag: 'info',
    });
  }, ORDER_PENDING_TIMEOUT_MS);
}

// ── render open orders ─────────────────────────────────────────────────────────
function renderOrders() {
  const list = ge('orders-list');
  const orderIds = Object.keys(openOrders);
  
  if (orderIds.length === 0) {
    list.innerHTML = '<span style="color:var(--muted);font-size:10px">No open orders</span>';
    return;
  }
  
  list.innerHTML = orderIds.map(clordId => {
    const o = openOrders[clordId];
    const isSell = o.side === '2';
    const leaves = book.orderState[clordId]?.leaves || o.qty;
    const sideStr = isSell ? 'SELL' : 'BUY';
    return `<div class="order-row ${isSell ? 'sell' : ''}">
      <div class="order-info">
        <span class="sym">${esc(o.symbol)}</span>
        <span class="qty">${Math.round(leaves).toLocaleString()}</span>
        <span class="px">@ ${fmt(o.price)}</span>
      </div>
      <button class="order-cancel" onclick="cancelOrder('${esc(clordId)}', '${esc(o.symbol)}', ${o.qty})">✕</button>
    </div>`;
  }).join('');
}

function cancelOrder(clordId, symbol, qty) {
  clearPendingTimeout(clordId);
  send({ action: 'cancel', clord_id: clordId, symbol, qty });
  delete openOrders[clordId];
  renderOrders();
}

function openDlg(type) {

  const w = ge('dlg-fields'); w.innerHTML = '';

      </select></div>`;

}
function closeDlg() { ge('dlg-ov').style.display = 'none'; }
function submitDlg() {

  def.fields.forEach(([,id]) => { p[id] = ge('di-'+id).value.trim(); });

// ── log ───────────────────────────────────────────────────────────────────────
function appendLog(entry) {
  const box = ge('log-box');
  const el  = document.createElement('div');
  el.className = 'le';
  el.innerHTML = `<span class="lts">[${esc(entry.ts)}]</span>
    <span class="llbl t${esc(entry.tag)}">${esc(entry.label)}</span>
    <div class="lbody">${esc(entry.body)}</div>`;
  box.appendChild(el);
  while (box.children.length > 300) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

function now() {
  return new Date().toTimeString().slice(0, 12);
}

// ── order book — parse exec reports from FIX messages ─────────────────────────
// Tags we care about (as strings after " │ " splitting):
// 35=MsgType  39=OrdStatus  54=Side  11=ClOrdID
// 44=Price  38=OrderQty  31=LastPx  32=LastQty
// 151=LeavesQty  14=CumQty  55=Symbol  6=AvgPx

function parseFix(body) {
  const f = {};
  body.split(' │ ').forEach(part => {
    const eq = part.indexOf('=');
    if (eq > 0) f[part.slice(0, eq)] = part.slice(eq + 1);
  });
  return f;
}

function sf(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

function rmQty(side, price, qty) {
  if (side === '1') {
    if (book.bids[price] !== undefined) {
      book.bids[price] = Math.max(0, book.bids[price] - qty);
      if (book.bids[price] === 0) delete book.bids[price];
    }
  } else {
    if (book.asks[price] !== undefined) {
      book.asks[price] = Math.max(0, book.asks[price] - qty);
      if (book.asks[price] === 0) delete book.asks[price];
    }
  }
}

function addQty(side, price, qty) {
  if (side === '1') book.bids[price] = (book.bids[price] || 0) + qty;
  else              book.asks[price] = (book.asks[price] || 0) + qty;
}

function applyOrderLeaves(clordId, side, price, newLeaves) {
  if (!clordId || !side || !(price > 0)) return;

  const prev = book.orderState[clordId];
  const prevLeaves = prev ? prev.leaves : 0;
  const delta = newLeaves - prevLeaves;

  if (delta > 0) addQty(side, price, delta);
  else if (delta < 0) rmQty(side, price, -delta);

  if (newLeaves > 0) {
    book.orderState[clordId] = { side, price, leaves: newLeaves };
  } else {
    delete book.orderState[clordId];
  }
}

function updateBookFromFix(body, tag) {
  // only parse inbound exec reports (tag = 'feed')
  if (tag !== 'feed') return;

  const f = parseFix(body);
  if (f['35'] !== '8') return;   // only ExecutionReport

  const status    = f['39'] || '';
  const side      = f['54'] || '';
  // Use OrigClOrdID (41) if available (for cancel reports), else ClOrdID (11)
  const clordId   = f['41'] || f['11'] || '';
  const lastPx    = sf(f['31']);
  const lastQty   = sf(f['32']);
  const qty       = sf(f['38']);
  const leavesQty = sf(f['151']);
  const sym       = f['55'];

  if (clordId) clearPendingTimeout(clordId);

  // resolve price: tag 44 > tag 6 > pending cache
  let price = sf(f['44'] || f['6']);
  const cached = book.pending[clordId];
  if (price === 0 && cached) price = cached.price;

  if (sym) book.symbol = sym;

  if (status === '0' || status === 'A') {
    // New: set leaves on book
    const newLeaves = leavesQty > 0 ? leavesQty : qty;
    applyOrderLeaves(clordId, side, price, newLeaves);

  } else if (status === '1') {
    // PartiallyFilled: record trade and update leaves
    if (lastPx > 0 && lastQty > 0) {
      book.last = lastPx;
      book.trades.unshift([lastPx, lastQty, side === '1' ? 'B' : 'S',
                           new Date().toTimeString().slice(0,8)]);
      book.trades = book.trades.slice(0, 20);
    }
    applyOrderLeaves(clordId, side, price, leavesQty);
    renderOrders();

  } else if (status === '2') {
    // Filled: record trade, remove from book
    const fillPx  = lastPx  > 0 ? lastPx  : price;
    const fillQty = lastQty > 0 ? lastQty : qty;
    if (fillPx > 0 && fillQty > 0) {
      book.last = fillPx;
      book.trades.unshift([fillPx, fillQty, side === '1' ? 'B' : 'S',
                           new Date().toTimeString().slice(0,8)]);
      book.trades = book.trades.slice(0, 20);
    }
    applyOrderLeaves(clordId, side, price, 0);
    cleanupOrderState(clordId);
    renderOrders();

  } else if (status === '3' || status === '4' || status === 'C' || status === '8') {
    // Cancelled/Expired
    applyOrderLeaves(clordId, side, price, 0);
    cleanupOrderState(clordId);
    renderOrders();
  }

  renderBook();
}

// ── render order book ─────────────────────────────────────────────────────────
function renderBook() {
  ge('book-sym').textContent  = 'ORDER BOOK  ' + book.symbol;
  ge('book-last').textContent = book.last != null ? 'last: ' + fmt(book.last) : 'last: —';

  const bids = Object.entries(book.bids).map(([p,q])=>[+p,q])
                     .sort((a,b)=>b[0]-a[0]).slice(0, LEVELS);
  const asks = Object.entries(book.asks).map(([p,q])=>[+p,q])
                     .sort((a,b)=>a[0]-b[0]).slice(0, LEVELS);

  const allQ = [...bids,...asks].map(r=>r[1]);
  const maxQ = allQ.length ? Math.max(...allQ) : 1;

  renderLevels('asks', [...asks].reverse(), 'ask', maxQ);

  if (bids.length && asks.length) {
    const sp = asks[0][0] - bids[0][0], mid = (asks[0][0] + bids[0][0]) / 2;
    ge('spread-row').textContent = 'spread: '+fmt(sp)+'   mid: '+fmt(mid);
  } else {
    ge('spread-row').textContent = 'spread: —';
  }

  renderLevels('bids', bids, 'bid', maxQ);

  ge('trades-list').innerHTML = book.trades.map(([px,qty,s,ts]) => `
    <div class="tr-row tr-${s==='B'?'buy':'sell'}">
      <span class="td">${s==='B'?'▲':'▼'}</span>
      <span class="tp">${fmt(px)}</span>
      <span class="tq">${Math.round(qty).toLocaleString()}</span>
      <span class="tt">${esc(ts)}</span>
    </div>`).join('');

  // update price chart
  if (book.trades.length !== lastTradeCount) {
    const newCount = book.trades.length - lastTradeCount;
    if (lastTradeCount > 0 && newCount > 0) {
      book.trades.slice(0, newCount).reverse()
        .forEach(([px,,,ts]) => chartPts.push({ price: +px, ts }));
    } else if (lastTradeCount === 0) {
      [...book.trades].reverse()
        .forEach(([px,,,ts]) => chartPts.push({ price: +px, ts }));
    }
    lastTradeCount = book.trades.length;
    if (chartPts.length > 200) chartPts = chartPts.slice(-200);
    drawChart();
  }
}

function renderLevels(id, levels, cls, maxQ) {
  while (levels.length < LEVELS) levels.push(null);
  ge(id).innerHTML = levels.map(row => {
    if (!row) return `<div class="bk-level ${cls}-lv"></div>`;
    const [px, qty] = row, pct = (qty / maxQ * 100).toFixed(1);
    return `<div class="bk-level ${cls}-lv">
      <div class="bar" style="width:${pct}%"></div>
      <span class="lv-qty">${Math.round(qty).toLocaleString()}</span>
      <span class="lv-px">${fmt(px)}</span></div>`;
  }).join('');
}

// ── price chart ───────────────────────────────────────────────────────────────
function clearChart() { chartPts = []; lastTradeCount = 0; drawChart(); }

function drawChart() {
  const wrap = ge('chart-wrap'), canvas = ge('price-canvas');
  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth || 240, H = wrap.clientHeight || 300;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#0a0c10'; ctx.fillRect(0,0,W,H);

  if (chartPts.length < 2) {
    ctx.fillStyle='#5a6070'; ctx.font='10px Courier New'; ctx.textAlign='center';
    ctx.fillText('waiting for trades…', W/2, H/2); return;
  }

  const PAD_L=52,PAD_R=8,PAD_T=14,PAD_B=28;
  const cW=W-PAD_L-PAD_R, cH=H-PAD_T-PAD_B;
  const prices = chartPts.map(p=>p.price);
  let minP=Math.min(...prices), maxP=Math.max(...prices);
  if (maxP===minP){minP-=0.5;maxP+=0.5;}
  const lo=minP-(maxP-minP)*.1, hi=maxP+(maxP-minP)*.1;
  const xOf = i => PAD_L + (i/(chartPts.length-1))*cW;
  const yOf = p => PAD_T + (1-(p-lo)/(hi-lo))*cH;

  // grid
  ctx.strokeStyle='#1e2330'; ctx.lineWidth=1;
  for (let i=0;i<=4;i++) {
    const p=lo+(hi-lo)*(i/4), y=yOf(p);
    ctx.beginPath(); ctx.moveTo(PAD_L,y); ctx.lineTo(W-PAD_R,y); ctx.stroke();
    ctx.fillStyle='#5a6070'; ctx.font='9px Courier New'; ctx.textAlign='right';
    ctx.fillText(p.toFixed(2),PAD_L-4,y+3);
  }
  // area
  const grad=ctx.createLinearGradient(0,PAD_T,0,PAD_T+cH);
  grad.addColorStop(0,'rgba(0,230,118,.18)'); grad.addColorStop(1,'rgba(0,230,118,0)');
  ctx.beginPath(); ctx.moveTo(xOf(0),yOf(chartPts[0].price));
  chartPts.forEach((pt,i)=>{if(i>0)ctx.lineTo(xOf(i),yOf(pt.price));});
  ctx.lineTo(xOf(chartPts.length-1),PAD_T+cH); ctx.lineTo(xOf(0),PAD_T+cH);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  // line
  ctx.beginPath(); ctx.strokeStyle='#00e676'; ctx.lineWidth=1.5; ctx.lineJoin='round';
  chartPts.forEach((pt,i)=>{
    i===0?ctx.moveTo(xOf(i),yOf(pt.price)):ctx.lineTo(xOf(i),yOf(pt.price));});
  ctx.stroke();
  // dots
  chartPts.forEach((pt,i)=>{
    ctx.beginPath(); ctx.arc(xOf(i),yOf(pt.price),3,0,Math.PI*2);
    ctx.fillStyle='#00e676'; ctx.fill();
  });
  // last price dashed line
  const last=chartPts[chartPts.length-1], ly=yOf(last.price);
  ctx.setLineDash([3,3]); ctx.strokeStyle='#ffd740'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(PAD_L,ly); ctx.lineTo(W-PAD_R,ly); ctx.stroke();
  ctx.setLineDash([]);
  const lbl=last.price.toFixed(4);
  ctx.font='bold 9px Courier New';
  const tw=ctx.measureText(lbl).width+8;
  ctx.fillStyle='#ffd740';
  ctx.fillRect(PAD_L-tw-2,ly-7,tw,14);
  ctx.fillStyle='#0d0f14'; ctx.textAlign='right';
  ctx.fillText(lbl,PAD_L-5,ly+4);
  // x timestamps
  ctx.fillStyle='#5a6070'; ctx.font='8px Courier New'; ctx.textAlign='center';
  [[0,PAD_L],[Math.floor((chartPts.length-1)/2),W/2],[chartPts.length-1,W-PAD_R]]
    .forEach(([idx,x])=>{if(chartPts[idx])ctx.fillText(chartPts[idx].ts,x,H-8);});
}

// ── mobile tabs ───────────────────────────────────────────────────────────────
function showTab(id) {
  ['col-left','col-book','col-log','col-chart'].forEach(c => {
    ge(c).classList.toggle('active', c === id);
  });
  ['tab-left','tab-book','tab-log','tab-chart'].forEach(t => {
    ge(t).classList.toggle('active', t.replace('tab-','col-') === id);
  });
  if (id === 'col-chart') setTimeout(drawChart, 50);
}

// ── boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',   drawChart);
window.addEventListener('resize', drawChart);
connectWS();
</script>
