<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Market Simulator — Login</title>
<style>
  :root {
    --bg:#0d0f14; --panel:#13161e; --border:#1e2330;
    --green:#00e676; --red:#ff3d57; --blue:#2979ff;
    --teal:#00bcd4; --text:#e8ecf4; --muted:#5a6070;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 380px;
    padding: 36px 32px 28px;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-logo h1 {
    color: var(--green);
    font-size: 15px;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .login-logo p {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: .08em;
    margin-top: 4px;
  }

  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    background: #1a1e2a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
  }
  .field input:focus {
    border-color: var(--blue);
  }

  .btn-login {
    display: block;
    width: 100%;
    margin-top: 22px;
    padding: 11px 0;
    background: var(--blue);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: .06em;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-login:hover   { filter: brightness(1.15); }
  .btn-login:active  { filter: brightness(.9); }
  .btn-login:disabled {
    opacity: .45;
    cursor: not-allowed;
    filter: none;
  }

  #error-msg {
    display: none;
    margin-top: 14px;
    padding: 9px 12px;
    background: rgba(255, 61, 87, .12);
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 11px;
    text-align: center;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <h1>Market Simulator</h1>
    <p>FIX 4.2 Trading Terminal</p>
  </div>

  <div class="field">
    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username"
           placeholder="enter username" spellcheck="false">
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password"
           placeholder="enter password">
  </div>

  <button class="btn-login" id="btn-login">Connect</button>
  <div id="error-msg"></div>
</div>

<script>
'use strict';

const userEl = document.getElementById('username');
const passEl = document.getElementById('password');
const btn    = document.getElementById('btn-login');
const errEl  = document.getElementById('error-msg');
const pageParams = new URLSearchParams(window.location.search);
const requestedUsername = pageParams.get('username') || '';

if (requestedUsername) {
  userEl.value = requestedUsername;
}

// ── login ─────────────────────────────────────────────────────────────────────
function showError(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function hideError() {
  errEl.style.display = 'none';
}

function setLoading(on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span>Connecting…'
    : 'Connect';
}

function authMessageFromResponse(data) {
  const code = String((data && data.code) || '').trim();
  switch (code) {
    case 'USERNAME_REQUIRED':
      return 'Username is required.';
    case 'PASSWORD_REQUIRED':
      return 'Password is required.';
    case 'USER_EXISTS_WRONG_PASSWORD':
      return 'This username already exists and the password is incorrect. Use the right password or choose another username.';
    case 'PASSWORD_HASH_FAILED':
      return 'Account creation is temporarily unavailable. Please try again.';
    default:
      return (data && data.error) ? String(data.error) : 'Authentication failed.';
  }
}

async function loadMarketCandidates() {
  const candidates = [];

  const currentUrl = new URL(location.href);
  const currentHost = currentUrl.hostname;
  const currentIsLocal = (
    currentHost === 'localhost' ||
    currentHost === '127.0.0.1' ||
    currentHost === '::1'
  );

  function isLoopbackHost(hostname) {
    return hostname === 'localhost' ||
           hostname === '127.0.0.1' ||
           hostname === '::1';
  }

  function shouldUseCandidate(rawUrl) {
    try {
      const parsed = new URL(rawUrl, location.origin);

      // Avoid mixed-content failures (https page trying to call http API).
      if (currentUrl.protocol === 'https:' && parsed.protocol !== 'https:') {
        return false;
      }

      // If user is not on a local page, never try loopback targets.
      if (!currentIsLocal && isLoopbackHost(parsed.hostname)) {
        return false;
      }

      return true;
    } catch (_) {
      return false;
    }
  }

  try {
    const res = await fetch('/api/markets');
    if (res.ok) {
      const markets = await res.json();
      if (Array.isArray(markets)) {
        markets.forEach(m => {
          const url = String((m && m.url) || '').trim();
          if (!url) return;
          if (!shouldUseCandidate(url)) return;
          if (!candidates.includes(url)) candidates.push(url);
        });
      }
    }
  } catch (_) {}

  // Fallback for single-market deployments serving login + API on same origin.
  if (shouldUseCandidate(location.origin) && !candidates.includes(location.origin)) {
    candidates.push(location.origin);
  }

  return candidates;
}

async function doLogin() {
  hideError();

  const username  = userEl.value.trim();
  const password  = passEl.value;

  if (!username) { showError('Username is required.'); userEl.focus(); return; }
  if (!password) { showError('Password is required.'); passEl.focus(); return; }

  setLoading(true);

  try {
    const candidates = await loadMarketCandidates();
    let lastAuthError = null;
    let anyReachable = false;
    let anyLoginEndpoint = false;

    for (const baseUrl of candidates) {
      try {
        const res = await fetch(`${baseUrl}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        anyReachable = true;

        // Some origins (e.g. login gateways) may not expose /api/login.
        // Ignore these and continue with other advertised market URLs.
        if (res.status === 404) {
          continue;
        }

        let data = {};
        try { data = await res.json(); } catch (_) {}
        anyLoginEndpoint = true;

        if (!res.ok) {
          lastAuthError = authMessageFromResponse(data);
          continue;
        }

        try {
          localStorage.setItem('last_username', data.username || username);
        } catch (_) {}

        const token = encodeURIComponent(data.token || '');
        const usernameSafe = encodeURIComponent(data.username || username);
        const passwordSafe = encodeURIComponent(password);
        const adminSafe = encodeURIComponent(String(!!data.is_admin));
        location.href = `${baseUrl}/app?token=${token}&username=${usernameSafe}&password=${passwordSafe}&is_admin=${adminSafe}`;
        return;
      } catch (_) {
        // try next candidate
      }
    }

    if (anyLoginEndpoint && lastAuthError) {
      showError(lastAuthError);
      passEl.focus();
    } else if (anyReachable) {
      showError('No market login endpoint found. Check market URLs in /api/markets.');
    } else {
      showError('Could not reach market server.');
    }
    setLoading(false);
  } catch (e) {
    showError('Could not reach market server.');
    setLoading(false);
  }
}

btn.addEventListener('click', doLogin);

[userEl, passEl].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

// Auto-focus username field
if (!userEl.value) {
  try {
    userEl.value = localStorage.getItem('last_username') || '';
  } catch (_) {}
}
if (userEl.value) {
  passEl.focus();
} else {
  userEl.focus();
}
</script>
</body>
</html>
