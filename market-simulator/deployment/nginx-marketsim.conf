# Nginx config for www.marketsim.site
#
# Responsibilities:
#   - Terminate TLS (Let's Encrypt or your cert)
#   - Route WebSocket connections for each market via path prefix
#     so browsers can use wss://www.marketsim.site/nasdaq/ws (port 443)
#     instead of wss://www.marketsim.site:9870 (no TLS listener there)
#   - Forward all other requests to the gateway
#
# Install:
#   sudo cp deployment/nginx-marketsim.conf /etc/nginx/sites-available/marketsim
#   sudo ln -sf /etc/nginx/sites-available/marketsim /etc/nginx/sites-enabled/marketsim
#   sudo nginx -t && sudo systemctl reload nginx

# ── NASDAQ WebSocket — direct port access (wss://host:9870/ws) ───────────────
# Browsers that receive port-based market URLs connect here.
# nginx owns :9870 with TLS; Docker binds the container on host :19870.
server {
    listen 9870 ssl;
    listen [::]:9870 ssl;
    server_name www.marketsim.site;

    ssl_certificate     /etc/letsencrypt/live/marketsim.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketsim.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /ws {
        proxy_pass         http://127.0.0.1:19870/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass         http://127.0.0.1:19870;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
    }
}

# ── NYSE WebSocket — direct port access (wss://host:9885/ws) ────────────────
server {
    listen 9885 ssl;
    listen [::]:9885 ssl;
    server_name www.marketsim.site;

    ssl_certificate     /etc/letsencrypt/live/marketsim.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketsim.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /ws {
        proxy_pass         http://127.0.0.1:19885/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass         http://127.0.0.1:19885;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.marketsim.site marketsim.site;
    return 301 https://www.marketsim.site$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.marketsim.site;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Update these paths if your cert lives elsewhere.
    ssl_certificate     /etc/letsencrypt/live/marketsim.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketsim.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

        # ── NASDAQ WebSocket ──────────────────────────────────────────────────────
        # Browser connects to wss://www.marketsim.site/nasdaq/ws?...
        # Nginx strips /nasdaq prefix and forwards to plain-WS market service.
        location /nasdaq/ws {
            proxy_pass         http://127.0.0.1:19870/ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── NYSE WebSocket ────────────────────────────────────────────────────────
        location /nyse/ws {
            proxy_pass         http://127.0.0.1:19885/ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

    # ── Gateway (login page, /app, /api/*) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:9860;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
